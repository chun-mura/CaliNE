name: Keepalive

on:
  schedule:
    - cron: "0 0 1 * *" # 毎月1日 UTC 0:00（60日無活動による workflow 無効化を防ぐ）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Push empty commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive to prevent scheduled workflow disable"
          git push
